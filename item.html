    <script>
      (() => {
        const KEY = 'lume.theme';
        const COLORS = { light: '#f5ebd8', dark: '#1c1108' };
        const root = document.documentElement;
        const read = () => { try { return localStorage.getItem(KEY); } catch { return null; } };
        const write = (v) => { try { localStorage.setItem(KEY, v); } catch {} };
        const prefers = () => window.matchMedia('(prefers-color-scheme: dark)').matches;
        const apply = (theme, persist) => {
          root.dataset.theme = theme;
          if (persist) write(theme);
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', COLORS[theme] || COLORS.light);
          const btn = document.getElementById('theme-toggle');
          if (btn) btn.setAttribute('aria-label', theme === 'dark' ? 'Mudar para tema claro' : 'Mudar para tema escuro');
        };
        apply(read() || (prefers() ? 'dark' : 'light'), false);
        const wire = () => {
          const btn = document.getElementById('theme-toggle');
          if (!btn || btn.dataset.wired) return;
          btn.dataset.wired = '1';
          btn.addEventListener('click', () => {
            apply(root.dataset.theme === 'dark' ? 'light' : 'dark', true);
          });
        };
        if (document.readyState !== 'loading') wire();
        else document.addEventListener('DOMContentLoaded', wire);
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (read()) return;
          apply(e.matches ? 'dark' : 'light', false);
        });
      })();
    </script>
